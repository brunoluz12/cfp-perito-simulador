<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teste de Pfister</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f3f2f7;
    --surface: #ffffff;
    --surface2: #ededf5;
    --border: rgba(0,0,0,0.07);
    --text: #1a1825;
    --muted: #7a788a;
    --accent: #7c5fe6;
    --accent2: #e05fa0;
    --radius: 14px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 40px 20px 80px;
    background-image: radial-gradient(ellipse at 20% 0%, rgba(124,95,230,0.07) 0%, transparent 50%),
                      radial-gradient(ellipse at 80% 100%, rgba(224,95,160,0.05) 0%, transparent 50%);
  }

  header {
    text-align: center;
    margin-bottom: 48px;
    animation: fadeDown 0.6s ease both;
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 400;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #1a1825 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  header p {
    color: var(--muted);
    font-size: 0.9rem;
    margin-top: 8px;
    font-weight: 300;
    letter-spacing: 0.3px;
  }

  #step-indicator {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 40px;
    animation: fadeDown 0.6s ease 0.1s both;
  }

  .step-dot {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--muted);
    transition: all 0.3s ease;
  }

  .step-dot.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #ffffff;
    font-weight: 600;
    box-shadow: 0 0 16px rgba(124,95,230,0.3);
  }

  .step-dot.done {
    background: rgba(124,95,230,0.12);
    border-color: rgba(124,95,230,0.3);
    color: var(--accent);
  }

  .step-line {
    height: 1px;
    width: 40px;
    background: var(--border);
  }

  #step-label {
    text-align: center;
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 28px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: 500;
  }

  /* PALETTE */
  #palette-section {
    max-width: 720px;
    margin: 0 auto 36px; /* overridden by #main-layout */
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    animation: fadeUp 0.6s ease 0.2s both;
  }

  #palette-section h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 1rem;
    font-weight: 400;
    color: var(--muted);
    margin-bottom: 20px;
    letter-spacing: 0.3px;
  }

  #palette {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
  }

  .color-swatch {
    width: 44px; height: 44px;
    border-radius: 10px;
    cursor: pointer;
    border: 2px solid transparent;
    position: relative;
    transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    flex-shrink: 0;
  }

  .color-swatch:hover {
    transform: translateY(-3px) scale(1.08);
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
  }

  .color-swatch.selected {
    border-color: #fff;
    transform: translateY(-3px) scale(1.1);
    box-shadow: 0 0 0 3px rgba(255,255,255,0.2), 0 8px 20px rgba(0,0,0,0.5);
  }

  .color-swatch .swatch-label {
    position: absolute;
    bottom: -20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    font-weight: 600;
    color: var(--muted);
    white-space: nowrap;
    letter-spacing: 0.3px;
    pointer-events: none;
  }

  .swatch-wrapper {
    position: relative;
    margin-bottom: 22px;
  }

  /* SELECTED COLOR DISPLAY */
  #selected-display {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  #selected-preview {
    width: 32px; height: 32px;
    border-radius: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    transition: background 0.2s;
    flex-shrink: 0;
  }

  #selected-name {
    font-size: 0.85rem;
    color: var(--muted);
    font-weight: 400;
  }

  /* PYRAMID */
  #pyramid-section {
    max-width: 100%;
    margin: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px;
    animation: fadeUp 0.6s ease 0.3s both;
  }

  #pyramid-section h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 1rem;
    font-weight: 400;
    color: var(--muted);
    margin-bottom: 28px;
    letter-spacing: 0.3px;
  }

  #pyramid {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .row {
    display: flex;
    gap: 6px;
    justify-content: center;
  }

  .cell {
    width: 52px; height: 52px;
    border-radius: 10px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    cursor: pointer;
    transition: transform 0.12s ease, box-shadow 0.12s ease, border-color 0.12s ease;
  }

  .cell:hover {
    transform: scale(1.08);
    border-color: rgba(124,95,230,0.4);
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
  }

  .cell.filled {
    border-color: transparent;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }

  /* BUTTON */
  #btn-avancar {
    display: block;
    margin: 0 auto;
    padding: 14px 48px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #0f0f13;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    border: none;
    border-radius: 100px;
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    animation: fadeUp 0.6s ease 0.4s both;
  }

  #btn-avancar:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(124,95,230,0.3);
  }

  #btn-avancar:active { transform: scale(0.97); }

  /* RESULTS */
  #result {
    max-width: 900px;
    margin: 48px auto 0;
    animation: fadeUp 0.7s ease both;
  }

  #result h3 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.6rem;
    font-weight: 400;
    margin-bottom: 12px;
    color: var(--text);
  }

  .disclaimer {
    background: rgba(124,95,230,0.06);
    border: 1px solid rgba(124,95,230,0.15);
    border-radius: 10px;
    padding: 14px 18px;
    font-size: 0.82rem;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 32px;
  }

  /* MINI PYRAMIDS */
  .result-container {
    display: flex;
    justify-content: center;
    gap: 28px;
    flex-wrap: wrap;
    margin-bottom: 40px;
  }

  .result-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 28px;
    text-align: center;
  }

  .result-block h4 {
    font-family: 'DM Serif Display', serif;
    font-weight: 400;
    font-size: 1rem;
    color: var(--muted);
    margin-bottom: 20px;
  }

  .mini-pyramid {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .mini-pyramid .row { gap: 4px; }

  .mini-pyramid .cell {
    width: 34px; height: 34px;
    border-radius: 7px;
    cursor: default;
  }

  .mini-pyramid .cell:hover {
    transform: none;
    box-shadow: none;
  }

  /* TABLE */
  .table-wrapper {
    overflow-x: auto;
    margin-bottom: 32px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    background: var(--surface);
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border);
  }

  thead tr {
    background: var(--surface2);
  }

  th {
    padding: 14px 18px;
    text-align: left;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
  }

  td {
    padding: 12px 18px;
    font-size: 0.875rem;
    color: var(--text);
    border-bottom: 1px solid rgba(0,0,0,0.04);
  }

  tr:last-child td { border-bottom: none; }

  tr:hover td { background: rgba(0,0,0,0.015); }

  .badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 3px 12px;
    border-radius: 100px;
    font-size: 0.78rem;
    font-weight: 600;
  }

  .badge-up { background: rgba(255,100,100,0.12); color: #ff8080; }
  .badge-down { background: rgba(100,150,255,0.12); color: #80aaff; }
  .badge-normal { background: rgba(100,220,100,0.1); color: #80dd80; }

  /* FINDINGS */
  .findings-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    margin-bottom: 24px;
  }

  .findings-section h3 {
    font-size: 1.4rem;
    margin-bottom: 20px;
  }

  .finding-item {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 12px 0;
    border-bottom: 1px solid rgba(0,0,0,0.05);
    font-size: 0.875rem;
  }

  .finding-item:last-child { border-bottom: none; }

  .finding-label {
    font-weight: 600;
    color: var(--accent);
    white-space: nowrap;
    min-width: 130px;
    font-size: 0.8rem;
    padding-top: 2px;
  }

  .finding-desc {
    color: var(--text);
    line-height: 1.6;
  }

  .finding-desc.not-found {
    color: var(--muted);
    font-style: italic;
  }

  /* SUMMARY */
  .summary-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    margin-bottom: 24px;
  }

  .summary-section h3 { margin-bottom: 20px; }

  .summary-item {
    margin-bottom: 20px;
  }

  .summary-item strong {
    display: block;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
  }

  .summary-item p {
    font-size: 0.875rem;
    color: var(--muted);
    line-height: 1.7;
  }

  /* ANIMATIONS */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes pop {
    0% { transform: scale(0.85); }
    60% { transform: scale(1.1); }
    100% { transform: scale(1); }
  }

  .cell.pop { animation: pop 0.2s ease; }

  /* LAYOUT LADO A LADO */
  #main-layout {
    display: flex;
    gap: 24px;
    max-width: 1100px;
    margin: 0 auto 36px;
    align-items: flex-start;
  }

  #main-layout #palette-section {
    flex: 0 0 300px;
    margin: 0;
    max-width: 300px;
  }

  #pyramid-side {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  #pyramid-side #pyramid-section {
    margin: 0;
  }

  #pyramid-side #btn-avancar {
    align-self: center;
  }

  @media (max-width: 700px) {
    #main-layout {
      flex-direction: column;
    }
    #main-layout #palette-section {
      flex: none;
      max-width: 100%;
    }
  }

  /* FÓRMULA CROMÁTICA */
  .fc-wrapper { margin-bottom: 24px; }
  .fc-title {
    font-family: "DM Serif Display", serif;
    font-size: 1.3rem;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 12px;
  }
  .fc-table {
    width: 100%;
    max-width: 700px;
    border-collapse: collapse;
    background: var(--surface);
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border);
    font-size: 0.82rem;
  }
  .fc-th {
    padding: 10px 18px;
    text-align: center;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    background: var(--surface2);
    border-bottom: 2px solid var(--border);
    border-right: 1px solid var(--border);
  }
  .fc-th:last-child { border-right: none; }
  .fc-th.fc-ca { color: #2a7a2a; }
  .fc-th.fc-cr { color: #7c5fe6; }
  .fc-th.fc-v  { color: #c08010; }
  .fc-th.fc-aus{ color: #b04040; }
  .fc-td {
    padding: 8px 18px;
    text-align: center;
    font-size: 0.82rem;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid rgba(0,0,0,0.04);
    vertical-align: top;
  }
  .fc-td:last-child { border-right: none; }
  .fc-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 9px;
    border-radius: 100px;
    font-size: 0.75rem;
    font-weight: 600;
    margin: 2px 3px;
    white-space: nowrap;
  }
  .fc-chip-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    border: 1px solid rgba(0,0,0,0.18);
    flex-shrink: 0;
  }
  .fc-chip-ca  { background: rgba(42,122,42,0.10);  color: #2a7a2a; }
  .fc-chip-cr  { background: rgba(124,95,230,0.10); color: #5a3fb0; }
  .fc-chip-v   { background: rgba(192,128,16,0.10); color: #8a5c00; }
  .fc-chip-aus { background: rgba(176,64,64,0.10);  color: #b04040; }
  .fc-total-row td {
    font-weight: 700;
    font-size: 0.8rem;
    background: rgba(0,0,0,0.025);
    padding: 9px 18px;
    border-top: 2px solid var(--border);
    color: var(--muted);
    text-align: center;
    border-right: 1px solid var(--border);
  }
  .fc-total-row td:last-child { border-right: none; }

  /* VARIAÇÃO CROMÁTICA / MATIZES */
  .fc-var-row {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    align-items: flex-start;
    margin-bottom: 24px;
  }
  .fc-var-row .fc-wrapper { flex: 1; min-width: 260px; margin-bottom: 0; }
  .var-table {
    width: 100%;
    border-collapse: collapse;
    background: var(--surface);
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border);
    font-size: 0.82rem;
  }
  .var-th {
    padding: 10px 16px;
    text-align: center;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    background: var(--surface2);
    border-bottom: 2px solid var(--border);
    border-right: 1px solid var(--border);
  }
  .var-th:last-child { border-right: none; }
  .var-th-p { width: 40px; }
  .var-td {
    padding: 12px 16px;
    text-align: center;
    font-size: 0.85rem;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid rgba(0,0,0,0.04);
    color: var(--text);
  }
  .var-td:last-child { border-right: none; }
  .var-td-p {
    font-weight: 700;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
    background: var(--surface2);
  }
  .var-td-num {
    font-weight: 700;
    font-size: 1rem;
    color: var(--accent);
  }
  tr:last-child .var-td { border-bottom: none; }

  /* TABELA DE TONALIDADES */
  .ton-table {
    width: 100%;
    border-collapse: collapse;
    background: var(--surface);
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border);
    font-size: 0.78rem;
    min-width: 700px;
  }
  .ton-th {
    padding: 8px 6px;
    text-align: center;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.4px;
    color: var(--muted);
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  .ton-th-label {
    text-align: left;
    padding-left: 14px;
    min-width: 90px;
    font-size: 0.75rem;
  }
  .ton-th-fam {
    text-transform: uppercase;
    font-size: 0.7rem;
    letter-spacing: 0.8px;
    border-bottom: 1px solid var(--border);
  }
  .ton-th-num {
    color: var(--text);
    font-weight: 700;
    min-width: 28px;
    font-size: 0.75rem;
  }
  .ton-th-sigma {
    color: var(--accent);
    font-weight: 700;
    font-size: 0.8rem;
    border-left: 1px dashed rgba(124,95,230,0.25);
    min-width: 38px;
  }
  .ton-td {
    padding: 8px 6px;
    text-align: center;
    font-size: 0.8rem;
    color: var(--text);
    border-bottom: 1px solid rgba(0,0,0,0.04);
    font-weight: 500;
  }
  .ton-td-label {
    text-align: left;
    padding-left: 14px;
    font-weight: 600;
    color: var(--muted);
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .ton-td-sigma {
    color: var(--accent);
    font-weight: 700;
    border-left: 1px dashed rgba(124,95,230,0.25);
  }
  .ton-td-border-left { border-left: 2px solid rgba(0,0,0,0.08); }
  .ton-td-total { background: rgba(124,95,230,0.04); font-weight: 700; }
  .ton-td-total.ton-td-label { color: var(--accent); }
  .ton-td-pct { background: rgba(124,95,230,0.07); font-weight: 700; font-size: 0.78rem; }
  .ton-td-pct.ton-td-label { color: var(--muted); font-size: 0.7rem; }
  .ton-td-pct.ton-td-sigma { color: var(--accent); }

  /* DIVIDER */
  .section-divider {
    height: 1px;
    background: var(--border);
    max-width: 900px;
    margin: 40px auto;
  }
</style>
</head>
<body>

<header>
  <h1>Teste de Pfister</h1>
  <p>Aplicação das Pirâmides de Cores</p>
</header>

<div id="step-indicator">
  <div class="step-dot active" id="dot-1">1</div>
  <div class="step-line"></div>
  <div class="step-dot" id="dot-2">2</div>
  <div class="step-line"></div>
  <div class="step-dot" id="dot-3">3</div>
</div>

<p id="step-label">Pirâmide 1 de 3</p>

<div id="main-layout">
  <div id="palette-section">
    <h2>Paleta de Cores</h2>
    <div id="palette"></div>
    <div id="selected-display">
      <div id="selected-preview"></div>
      <span id="selected-name">Nenhuma cor selecionada</span>
    </div>
  </div>

  <div id="pyramid-side">
    <div id="pyramid-section">
      <h2>Monte a Pirâmide</h2>
      <div id="pyramid"></div>
    </div>
    <button id="btn-avancar" onclick="finalizar()">Avançar →</button>
  </div>
</div>

<div id="result"></div>

<script>
var colors = [
  { code:'AZ1',hex:'#A5E6FA'},{ code:'AZ2',hex:'#399799'},{ code:'AZ3',hex:'#3C869F'},{ code:'AZ4',hex:'#2A2965'},
  { code:'VM1',hex:'#FD7E89'},{ code:'VM2',hex:'#C92F27'},{ code:'VM3',hex:'#9F2115'},{ code:'VM4',hex:'#7C2923'},
  { code:'VD1',hex:'#D4E50A'},{ code:'VD2',hex:'#92DB1C'},{ code:'VD3',hex:'#107F22'},{ code:'VD4',hex:'#2A3E23'},
  { code:'VI1',hex:'#ABA2D7'},{ code:'VI2',hex:'#742F4B'},{ code:'VI3',hex:'#62466E'},
  { code:'LA1',hex:'#FE7628'},{ code:'LA2',hex:'#FF4524'},
  { code:'AM1',hex:'#FFFD07'},{ code:'AM2',hex:'#FDB719'},
  { code:'MA1',hex:'#7C3F2C'},{ code:'MA2',hex:'#563224'},
  { code:'PR',hex:'#1D1F1C'},{ code:'BR',hex:'#FEFEFE'},{ code:'CI',hex:'#7E8E8E'}
];

var normas = {
  AZ:{p25:11.1,p75:22.2},
  VM:{p25:8.9,p75:20},
  VD:{p25:8.9,p75:17.8},

var selectedColor = null;
var etapa = 1;
var resultados = [];

var palette = document.getElementById('palette');

// PALETA
for (var i = 0; i < colors.length; i++) {
  var c = colors[i];
  var wrapper = document.createElement('div');
  wrapper.className = 'swatch-wrapper';

  var div = document.createElement('div');
  div.className = 'color-swatch';
  div.style.background = c.hex;
  if (c.hex === '#FEFEFE' || c.hex === '#FFFD07') {
    div.style.border = '2px solid rgba(255,255,255,0.2)';
  }

  var label = document.createElement('span');
  label.className = 'swatch-label';
  label.innerText = c.code;
  div.appendChild(label);

  div.onclick = (function(cor, el) {
    return function() {
      var all = document.querySelectorAll('.color-swatch');
      for (var k = 0; k < all.length; k++) all[k].classList.remove('selected');
      el.classList.add('selected');
      selectedColor = cor;
      document.getElementById('selected-preview').style.background = cor.hex;
      document.getElementById('selected-name').innerText = cor.code + ' — ' + cor.hex;
    };
  })(c, div);

  wrapper.appendChild(div);
  palette.appendChild(wrapper);
}

function updateStepIndicator() {
  for (var i = 1; i <= 3; i++) {
    var dot = document.getElementById('dot-' + i);
    dot.classList.remove('active', 'done');
    if (i < etapa) dot.classList.add('done');
    else if (i === etapa) dot.classList.add('active');
  }
}

function criarPiramide() {
  var pyramid = document.getElementById('pyramid');
  pyramid.innerHTML = '';
  for (var i = 1; i <= 5; i++) {
    var row = document.createElement('div');
    row.className = 'row';
    for (var j = 0; j < i; j++) {
      var cell = document.createElement('div');
      cell.className = 'cell';
      cell.onclick = function() {
        if (selectedColor) {
          this.style.background = selectedColor.hex;
          this.dataset.code = selectedColor.code;
          this.classList.add('filled', 'pop');
          var self = this;
          setTimeout(function() { self.classList.remove('pop'); }, 200);
        }
      };
      row.appendChild(cell);
    }
    pyramid.appendChild(row);
  }
}

criarPiramide();

function finalizar() {
  var cells = document.querySelectorAll('.cell');
  var faltando = 0;
  for (var i = 0; i < cells.length; i++) {
    if (!cells[i].dataset.code) faltando++;
  }

  if (faltando > 0) {
    alert('Faltam ' + faltando + ' quadrado(s) a preencher.');
    return;
  }

  var dados = [];
  for (var i = 0; i < cells.length; i++) {
    dados.push({ code: cells[i].dataset.code, color: cells[i].style.background });
  }
  resultados.push(dados);

  if (etapa < 3) {
    etapa++;
    document.getElementById('step-label').innerText = 'Pirâmide ' + etapa + ' de 3';
    updateStepIndicator();
    criarPiramide();
    window.scrollTo({ top: 0, behavior: 'smooth' });
    return;
  }

  document.getElementById('step-label').innerText = 'Análise Concluída';
  document.getElementById('dot-3').classList.remove('active');
  document.getElementById('dot-3').classList.add('done');
  mostrarResultadoFinal();
}
